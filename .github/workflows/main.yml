name: Lineage 15.1 TAQ90

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: Free space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          df -h

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            imagemagick lib32ncurses5-dev lib32readline-dev \
            lib32z1-dev liblz4-tool libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
            lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev openjdk-8-jdk

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Init Lineage
        run: |
          mkdir -p ~/android/lineage
          cd ~/android/lineage

          repo init -u https://github.com/LineageOS/android.git -b lineage-15.1

          repo sync -c --no-tags --no-clone-bundle -j2

      # ✅ DIRECT CLONE INTO CORRECT PATH (NO COPY, NO MOVE)

      - name: Device tree
        run: |
          cd ~/android/lineage
          git clone https://github.com/Tommy0412/device_denver_TAQ90.git device/denver/TAQ90

      - name: Vendor tree
        run: |
          cd ~/android/lineage
          git clone https://github.com/Tommy0412/vendor_denver_TAQ90.git vendor/denver/TAQ90

      - name: Build env
        run: |
          cd ~/android/lineage

          export USE_CCACHE=1
          ccache -M 50G

          source build/envsetup.sh
          lunch lineage_TAQ90-userdebug

      - name: Build recovery
        run: |
          cd ~/android/lineage
          source build/envsetup.sh
          lunch lineage_TAQ90-userdebug

          mka recoveryimage -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: recovery
          path: ~/android/lineage/out/target/product/TAQ90/recovery.img
