name: Lineage 15.1 TAQ90
on:
  workflow_dispatch:
permissions:
  contents: write 
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    steps:
      - name: Extreme Runner Cleanup (Free 15GB)
        run: |
          echo "=== Nuking pre-installed runner garbage ==="
          sudo rm -rf \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/powershell \
            /usr/share/miniconda \
            /usr/local/share/vcpkg \
            /usr/local/share/chromium \
            /opt/microsoft \
            /opt/google \
            /opt/az \
            /usr/local/lib/node_modules \
            /var/lib/apt/lists/* \
            /var/cache/apt/archives/*
          
          sudo docker image prune -af || true
          echo "✅ Disk space reclaimed:"
          df -h /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            imagemagick lib32ncurses5-dev lib32readline-dev \
            lib32z1-dev liblz4-tool libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
            lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev openjdk-8-jdk

      - name: Fix libncurses for Android 8.1 Clang
        run: |
          sudo apt-get install -y libncurses5 libtinfo5 2>/dev/null || {
            echo "Package not in repo. Creating safe symlinks..."
            sudo ln -sf /usr/lib/x86_64-linux-gnu/libncurses.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5
            sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
          }
          echo "✅ libncurses.so.5 dependency resolved"

      - name: Fix Python 2 Requirement for Android 8.1
        run: |
          # Android 8.1 build scripts strictly require Python 2.7
          sudo apt-get install -y python2 2>/dev/null || {
            sudo add-apt-repository ppa:deadsnakes/ppa -y
            sudo apt-get update
            sudo apt-get install -y python2.7
          }
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python
          python --version
          echo "✅ Python 2.7 set as default"

      - name: Use Java 8
        run: |
          sudo update-alternatives --set java /usr/lib/jvm/java-8-openjdk-amd64/jre/bin/java
          sudo update-alternatives --set javac /usr/lib/jvm/java-8-openjdk-amd64/bin/javac
          echo "JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-8-openjdk-amd64/bin" >> $GITHUB_PATH
          java -version
          javac -version

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ccache-taq90-${{ runner.os }}
          restore-keys: |
            ccache-taq90-${{ runner.os }}

      - name: Init repo
        run: |
          mkdir -p ~/android/lineage
          cd ~/android/lineage
          git config --global user.email "build@ci.local"
          git config --global user.name "CI Build"
          repo init -u https://github.com/LineageOS/android.git -b lineage-15.1 --depth=1

      - name: Sync source
        run: |
          cd ~/android/lineage
          repo sync -c --no-tags --no-clone-bundle --optimized-fetch \
            --prune --force-sync -j$(nproc)

      - name: Clone device tree
        run: |
          cd ~/android/lineage
          git clone --depth=1 https://github.com/Tommy0412/device_denver_TAQ90.git device_tmp
          rm -rf device/denver/TAQ90
          mkdir -p device/denver
          cp -r device_tmp/device/denver/TAQ90 device/denver/TAQ90
          rm -rf device_tmp

      - name: Clone vendor tree
        run: |
          cd ~/android/lineage
          git clone --depth=1 https://github.com/Tommy0412/vendor_denver_TAQ90.git vendor_tmp
          rm -rf vendor/denver/TAQ90
          mkdir -p vendor/denver
          cp -r vendor_tmp/vendor/denver/TAQ90 vendor/denver/TAQ90
          rm -rf vendor_tmp

      - name: Harden Build Environment for Lineage 15.1 CI
        run: |
          cd ~/android/lineage
          
          # 1. Fix Jack Server OOM crashes (GitHub runners have ~7GB RAM)
          export JACK_SERVER_VM_ARGUMENTS="-Xmx4096m -Dfile.encoding=UTF-8"
          export ANDROID_JACK_VM_ARGS="-Xmx4096m"
          echo "✅ Jack server memory limited to 4GB"
          
          # 2. Force Python 2 for ALL build scripts
          export BUILD_PYTHON_VERSION=2
          export PYTHON=python2
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python
          echo "✅ Python 2 forced globally"
          
          # 3. Optimize ccache for CI disk limits (prevents runner OOM)
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          ccache -M 3G  # GitHub free tier runs out of disk >5GB ccache
          echo "✅ ccache capped at 3GB"
          
          # 4. Pre-create output dirs to avoid permission races
          mkdir -p out/target/product/TAQ90/obj
          echo "✅ Output directories initialized"

      - name: Fix Jack Server SSL Error (Ubuntu 22.04)
        run: |
          cd ~/android/lineage
          echo "=== 1. Re-enabling TLSv1 in Java 8 ==="
          # Removes TLSv1 and TLSv1.1 from the disabled algorithms list
          sudo sed -i 's/TLSv1, TLSv1.1, //g' /etc/java-8-openjdk/security/java.security || true
          
          echo "=== 2. Lowering OpenSSL 3.0 Security Level ==="
          # Ubuntu 22.04 uses OpenSSL 3.0 which blocks TLSv1 at the system level.
          # We lower the security level to 0 to allow it.
          sudo sed -i 's/DEFAULT@SECLEVEL=2/DEFAULT@SECLEVEL=0/g' /etc/ssl/openssl.cnf || true
          sudo sed -i 's/DEFAULT@SECLEVEL=1/DEFAULT@SECLEVEL=0/g' /etc/ssl/openssl.cnf || true
          
          echo "=== 3. Cleaning up old Jack server state ==="
          prebuilts/sdk/tools/jack-admin kill-server 2>/dev/null || true
          rm -rf ~/.jack-server ~/.jack 2>/dev/null || true
          echo "✅ Jack server SSL environment fixed"

      - name: Build Full LineageOS ROM (Bacon)
        run: |
          cd ~/android/lineage
          export ALLOW_MISSING_DEPENDENCIES=true
          export PRODUCT_NOTICE_SPLIT=true 
          export CKATI_FLAGS=--use_find_emulator
          export JACK_SERVER_VM_ARGUMENTS="-Xmx4096m"
          export PYTHON=python2
          
          export CCACHE_DIR=/home/runner/.ccache
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          ccache -M 5G  # Give it 5GB of space
          ccache -z     # Reset statistics to 0 so we can see how many hits we get this run
          
          source build/envsetup.sh
          lunch lineage_TAQ90-userdebug
          
          # 'bacon' builds the system and packages it into a flashable ZIP
          make -j$(nproc) bacon
          
          # Show ccache statistics at the end to prove it's working!
          echo "=========================================="
          echo "=== CCACHE STATISTICS (Look for 'Cache hit') ==="
          echo "=========================================="
          ccache -s

      - name: Verify Cache Directory Exists Before Saving
        run: |
          echo "=== Checking if ccache directory actually has data ==="
          if [ -d "/home/runner/.ccache" ]; then
            echo "✅ Directory exists."
            echo "=== Directory contents (first 10 files) ==="
            ls -la /home/runner/.ccache | head -n 10
            echo "=== Total size of ccache directory ==="
            du -sh /home/runner/.ccache
          else
            echo "❌ FATAL: /home/runner/.ccache DOES NOT EXIST!"
            exit 1
          fi

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "Lineage 15.1 TAQ90 - Build #${{ github.run_number }}"
          draft: false
          prerelease: false
          files: |
            ~/android/lineage/out/target/product/TAQ90/lineage-*.zip
            ~/android/lineage/out/target/product/TAQ90/recovery.img
            ~/android/lineage/out/target/product/TAQ90/boot.img
            ~/android/lineage/out/target/product/TAQ90/vendor.img
            ~/android/lineage/out/target/product/TAQ90/system.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
